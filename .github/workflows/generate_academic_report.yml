name: Generate Academic Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  generate-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: generate-academic-report
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Ensure data directory exists
        run: |
          mkdir -p data

      - name: Run academic report script
        run: |
          echo "Running report generation..."
          python scripts/generate_academic_report.py

      - name: Verify output file exists
        run: |
          if [ ! -f data/academic_summary.json ]; then
            echo "Error: data/academic_summary.json was not generated."
            exit 1
          fi
          echo "Output file exists."

      - name: Show git status
        run: |
          git status
          ls -l data/academic_summary.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/academic_summary.json

          if git diff --cached --quiet; then
            echo "No changes detected. Nothing to commit."
          else
            git commit -m "auto: update academic summary"
            git push
          fi
