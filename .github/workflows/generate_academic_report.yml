name: Update Academic Report

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00，即北京时间/新加坡时间 09:00
  workflow_dispatch:

jobs:
  update-report:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: 运行报告脚本
        run: |
          python scripts/generate_academic_report.py

      - name: 提交更新结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/academic_summary.json
          git diff --cached --quiet || git commit -m "Auto update academic summary"
          git push
