name: Academic Data & Analysis Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨自动运行一次 (默认名单)
  workflow_dispatch:      # 允许手动或 Agent 通过 API 触发
    inputs:
      agent_keywords:
        description: 'Agent 传入的动态搜索关键词 (逗号分隔)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    env:
      # 💡 核心升级：如果 Agent 传了词，就用 Agent 的词；否则用默认学会名单
      KEYWORDS: ${{ github.event.inputs.agent_keywords != '' && github.event.inputs.agent_keywords || '自动化学会,王飞跃,杨孟飞,郑南宁,高会军,张承慧,戴琼海,何友' }}
      MAX_RESULTS_PER_KEYWORD: "30"
      MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      SS_API_KEY: ${{ secrets.SS_API_KEY }}

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 安装所有依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas jieba requests urllib3
          python -m playwright install --with-deps chromium

      - name: 4. 恢复知乎登录状态 (从 Secret 读取)
        env:
          STORAGE_JSON: ${{ secrets.storage }}
        run: |
          python - << 'PY'
          import os
          s = os.environ.get("STORAGE_JSON", "")
          if s.strip():
              with open("storage_state.json", "w", encoding="utf-8") as f:
                  f.write(s)
              print("Login state restored")
          PY
          cp storage_state.json scripts/storage_state.json || true

      - name: 5. 运行爬虫 (数据采集)
        run: |
          echo "当前执行的检索词为: $KEYWORDS"
          python -u scripts/zhihu.py
          # 如果你有其他平台的爬虫，也可以加在这里

      - name: 6. 运行学术报告分析 (数据加工)
        run: python scripts/generate_academic_report.py

      - name: 7. 提交并推送更新 (Agent 触发的更新)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "没有发现数据变动，跳过提交"
          else
            git commit -m "🤖 Agent 触发：动态采集与分析完成"
            git push
          fi
