<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>知乎舆情分析 - 社会雷达</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../CSS/data.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<style>
  /* 全局样式基础变量补充 (防缺失) */
  :root {
    --bg-color: #f5f7fa;
    --card-bg: #ffffff;
    --text-main: #2c3e50;
    --text-muted: #7f8c8d;
    --primary-color: #0084ff;
    --border-color: #e4e7ed;
    --shadow: 0 4px 12px rgba(0,0,0,0.05);
  }

  [data-theme="dark"] {
    --bg-color: #0d1117;
    --card-bg: #161b22;
    --text-main: #c9d1d9;
    --text-muted: #8b949e;
    --border-color: #30363d;
    --shadow: 0 4px 12px rgba(0,0,0,0.4);
  }

  body { background-color: var(--bg-color); color: var(--text-main); transition: background-color 0.3s; }
  
  /* 导航栏样式补充 (适配 navbar.js) */
  header { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .nav { display: flex; justify-content: space-between; align-items: center; height: 60px; }
  .brand { font-size: 1.2rem; font-weight: bold; color: var(--primary-color); }
  .menu { display: flex; align-items: center; gap: 20px; font-size: 0.95rem; }
  .menu a { text-decoration: none; color: inherit; }
  .menu a:hover, .menu a.active { color: var(--primary-color); }
  .theme-btn { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 5px; }

  /* 下拉菜单补充 */
  .dropdown { position: relative; display: inline-block; }
  .dropdown-content { display: none; position: absolute; background-color: var(--card-bg); min-width: 120px; box-shadow: var(--shadow); z-index: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
  .dropdown-content a { color: var(--text-main); padding: 12px 16px; text-decoration: none; display: block; font-size: 0.9rem; }
  .dropdown-content a:hover { background-color: var(--bg-color); color: var(--primary-color); }
  .dropdown:hover .dropdown-content { display: block; }

  /* 卡片和内容区适配暗黑模式 */
  .card { background-color: var(--card-bg); border-color: var(--border-color); color: var(--text-main); }
  .person-card { background-color: var(--card-bg); border: 1px solid var(--border-color); box-shadow: var(--shadow); }
  .person-header { border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.02); }
  .stat-box { background: var(--bg-color); border: 1px solid var(--border-color); }
  .post-date { color: var(--text-muted); }
  .person-post-list a { color: var(--text-main); }
</style>

</head>
<body>

<div id="loading">正在获取数据...</div>

<header id="common-header"></header>

<div class="container">

  <div class="card">
    <h2>知乎全量数据概览</h2>
    
    <div class="summary-bar">
        <div class="stat-box">
            <span class="stat-num" id="total-posts">0</span>
            <span class="stat-label">监控内容总量</span>
        </div>
        <div class="stat-box">
            <span class="stat-num" id="total-people">0</span>
            <span class="stat-label">覆盖话题/人物</span>
        </div>
    </div>

    <div class="charts-wrapper">
      <div>
        <h3 style="color: var(--text-main);">总热度趋势（按月）</h3>
        <div id="global-month" class="chart-container"></div>
      </div>
      <div>
        <h3 style="color: var(--text-main);">最近一周热度（按日）</h3>
        <div id="global-week" class="chart-container"></div>
      </div>
    </div>
  </div>

  <div class="card" style="margin: 20px 0; padding: 15px; display: flex; align-items: center; gap: 15px; background: var(--bg-color); border: 1px solid var(--border-color);">
      <h3 style="margin: 0; font-size: 16px; color: var(--text-main);">🔍 数据筛选：</h3>
      <label style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
          <input type="checkbox" id="negative-filter" onchange="toggleFilter()">
          <span style="color: #d32f2f; font-weight: bold;">只看“负面/争议”内容</span>
      </label>
      <span style="color: var(--text-muted); font-size: 12px;">(关键词：避雷, 踩坑, 甚至, 失望, 差评, 吐槽, 质疑, 骗子...)</span>
  </div>

  <div id="content-area"></div>

</div>

<script src="../JS/navbar.js"></script>

<script>
// ================= 全局配置与状态 =================
const CURRENT_DATE = new Date('2026-01-02');
// 定义负面关键词
const NEGATIVE_KEYWORDS = ["避雷", "踩坑", "甚至", "失望", "差评", "吐槽", "黑榜", "垃圾", "无语", "别去", "别买", "后悔", "上当", "质疑", "骗子", "恶心", "不行", "烂"];

// 全局数据
let GLOBAL_ALL_DATA = [];

// ================= 主题监听与颜色获取 =================
document.addEventListener('DOMContentLoaded', () => {
    observeThemeChange();
});

function observeThemeChange() {
    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.attributeName === 'data-theme' && GLOBAL_ALL_DATA.length > 0) {
                // 主题切换时重新渲染图表以适配文字颜色
                const globalStats = buildStats(GLOBAL_ALL_DATA);
                drawLine(document.getElementById('global-month'), globalStats.monthly.labels, globalStats.monthly.data);
                drawWeekly(document.getElementById('global-week'), globalStats.weekly);
                toggleFilter(); // 重新渲染列表及子图表
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
}

function getThemeColors() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    return {
        text: isDark ? '#c9d1d9' : '#333333',
        axisLine: isDark ? '#444444' : '#dddddd',
        splitLine: isDark ? 'rgba(255,255,255,0.05)' : '#f0f0f0'
    };
}

/* ================= 筛选逻辑 ================= */
function toggleFilter() {
    const isFilterOn = document.getElementById('negative-filter').checked;
    const area = document.getElementById('content-area');
    
    // 重新分组
    const grouped = {};
    let filteredCount = 0;

    GLOBAL_ALL_DATA.forEach(d => {
        // 筛选逻辑
        if (isFilterOn) {
            // 检查标题或摘要中是否包含负面词
            const textToCheck = (d.title + d.excerpt).toLowerCase();
            const hasNegativeWord = NEGATIVE_KEYWORDS.some(kw => textToCheck.includes(kw));
            if (!hasNegativeWord) return;
        }

        grouped[d.keyword] = grouped[d.keyword] || [];
        grouped[d.keyword].push(d);
        filteredCount++;
    });

    // 如果筛选后没数据
    if (Object.keys(grouped).length === 0) {
        area.innerHTML = '<div style="text-align:center; padding:50px; color:var(--text-muted);">没有找到符合条件的负面内容</div>';
        document.getElementById('total-posts').innerText = filteredCount + (isFilterOn ? " (筛选后)" : "");
        document.getElementById('total-people').innerText = 0;
        return;
    }

    // 更新统计数字
    document.getElementById('total-posts').innerText = filteredCount + (isFilterOn ? " (筛选后)" : "");
    document.getElementById('total-people').innerText = Object.keys(grouped).length;

    // 重新渲染列表
    renderPersons(grouped);
}

/* ================= CSV 解析 ================= */
function parseCSVLine(line) {
    const result = [];
    let startValue = 0;
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') {
            inQuotes = !inQuotes;
        } else if (line[i] === ',' && !inQuotes) {
            let val = line.substring(startValue, i);
            if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1).replace(/""/g, '"');
            result.push(val);
            startValue = i + 1;
        }
    }
    let lastVal = line.substring(startValue);
    if (lastVal.startsWith('"') && lastVal.endsWith('"')) lastVal = lastVal.slice(1, -1).replace(/""/g, '"');
    result.push(lastVal);
    return result;
}

function parseCSV(text){
    const lines = text.trim().split('\n');
    return lines.slice(1).map(l => {
        const arr = parseCSVLine(l);
        if(arr.length < 5) return null;
        return {
            keyword: arr[0],
            title: arr[1] || '无标题',
            url: arr[3],
            publish_time: arr[4],
            excerpt: arr.slice(5).join(',').substring(0, 100) + '...'
        };
    }).filter(item => item !== null && item.keyword);
}

/* ================= 统计计算 ================= */
function buildStats(data){
    const monthMap = {};
    const weekMap = {};
    const weekDays = [];

    const start = new Date(CURRENT_DATE);
    start.setDate(start.getDate() - 6);

    for(let i=0; i<7; i++){
        const d = new Date(start);
        d.setDate(d.getDate()+i);
        const k = d.toISOString().slice(0,10);
        weekDays.push(k);
        weekMap[k] = 0;
    }

    data.forEach(d => {
        if(!d.publish_time) return;
        
        const m = d.publish_time.slice(0,7);
        monthMap[m] = (monthMap[m]||0)+1;

        const day = d.publish_time.slice(0,10);
        if(weekMap[day] !== undefined){
            weekMap[day]++;
        }
    });

    return {
        monthly: {
            labels: Object.keys(monthMap).sort(),
            data: Object.keys(monthMap).sort().map(k => monthMap[k])
        },
        weekly: {
            labels: weekDays,
            data: weekDays.map(d => weekMap[d]),
            hasData: Object.values(weekMap).some(v => v > 0)
        }
    };
}

/* ================= ECharts 渲染 ================= */
function drawLine(dom, labels, data, color='#0084ff'){
    if(!dom) return;
    
    // 防内存泄漏
    let chart = echarts.getInstanceByDom(dom);
    if (chart) chart.dispose();
    chart = echarts.init(dom);
    
    const theme = getThemeColors();

    chart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { top: 20, right: 10, bottom: 20, left: 30, containLabel: true },
        xAxis: { 
            type: 'category', 
            data: labels,
            axisLine: { lineStyle: { color: theme.axisLine } },
            axisLabel: { color: theme.text, fontSize: 11 }
        },
        yAxis: { 
            type: 'value', 
            minInterval: 1,
            splitLine: { lineStyle: { type: 'dashed', color: theme.splitLine } },
            axisLabel: { color: theme.text }
        },
        series: [{
            type: 'line',
            data: data,
            smooth: true,
            symbol: 'circle',
            symbolSize: 6,
            itemStyle: { color: color },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: color.replace(')', ', 0.2)').replace('rgb', 'rgba') },
                    { offset: 1, color: 'rgba(255, 255, 255, 0)' }
                ])
            }
        }]
    });
    window.addEventListener('resize', () => chart.resize());
}

function drawWeekly(dom, stats){
    if(!stats.hasData){
        dom.innerHTML = '<div class="no-data-msg" style="color:var(--text-muted)">近一周无更新</div>';
        return;
    }
    drawLine(dom, stats.labels.map(d => d.slice(5)), stats.data, '#0084ff');
}

/* ================= 列表渲染 ================= */
function renderPersons(grouped){
    const area = document.getElementById('content-area');
    area.innerHTML = '';
    const isFilterOn = document.getElementById('negative-filter').checked;

    Object.keys(grouped).forEach((name, index) => {
        const personData = grouped[name];
        const stats = buildStats(personData);
        
        // 按时间倒序
        const sortedPosts = [...personData].sort((a, b) => {
            return new Date(b.publish_time) - new Date(a.publish_time);
        });
        
        const showPosts = sortedPosts.slice(0, 5); 

        let postsHtml = '<ul class="person-post-list" style="list-style:none; padding:0;">';
        showPosts.forEach(p => {
            let displayTitle = p.title;
            if (isFilterOn) {
                NEGATIVE_KEYWORDS.forEach(kw => {
                    displayTitle = displayTitle.replace(new RegExp(kw, 'g'), `<span style="color:#d32f2f;background:#ffebee;padding:0 2px;border-radius:2px;">${kw}</span>`);
                });
            }

            postsHtml += `
                <li style="margin-bottom: 12px; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px;">
                    <a href="${p.url}" target="_blank" title="${p.title}" style="color: var(--text-main); text-decoration: none; font-weight: 500; display: block; margin-bottom: 5px;">
                        ${displayTitle}
                    </a>
                    <span class="post-date" style="font-size: 0.85rem; color: var(--text-muted);">📅 ${p.publish_time}</span>
                </li>
            `;
        });
        postsHtml += '</ul>';

        const card = document.createElement('div');
        card.className = 'person-card';
        card.style.cssText = 'background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 25px; overflow: hidden; box-shadow: var(--shadow);';
        
        const mChartId = `m-${index}`;
        const wChartId = `w-${index}`;

        card.innerHTML = `
            <div class="person-header" style="background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--border-color); padding: 15px 20px; display: flex; align-items: center; gap: 15px;">
                <div class="person-avatar" style="width: 50px; height: 50px; background: #0084ff; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold;">${name[0]}</div>
                <div class="person-info">
                    <h3 style="margin: 0; color: var(--text-main);">${name}</h3>
                    <span class="tag-badge" style="background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-muted); padding: 2px 8px; border-radius: 12px; font-size: 12px; display: inline-block; margin-top: 5px;">相关内容: ${personData.length} 篇</span>
                </div>
            </div>

            <div class="person-body" style="padding: 20px;">
                <div class="charts-wrapper small" style="display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <h4 style="margin:0 0 5px 0; font-size:12px; color:var(--text-muted);">月度声量</h4>
                        <div class="chart-container" id="${mChartId}" style="height:140px; width:100%;"></div>
                    </div>
                    <div>
                        <h4 style="margin:10px 0 5px 0; font-size:12px; color:var(--text-muted);">本周动态</h4>
                        <div class="chart-container" id="${wChartId}" style="height:140px; width:100%;"></div>
                    </div>
                </div>

                <div class="person-posts" style="background: var(--bg-color); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);">
                    <h4 style="margin-top:0; color: var(--text-muted);">📝 精选知乎回答/文章 ${isFilterOn ? '(最新负面)' : '(最新)'}</h4>
                    ${postsHtml}
                </div>
            </div>
        `;

        area.appendChild(card);
        
        setTimeout(() => {
            drawLine(document.getElementById(mChartId), stats.monthly.labels, stats.monthly.data, '#0084ff');
            drawWeekly(document.getElementById(wChartId), stats.weekly);
        }, 0);
    });
}

// ================= 数据获取与入口 =================
Promise.all([
    fetch('../data/zhihu_data.csv').then(r => { if(!r.ok) throw new Error(r.status); return r.text(); }),
    fetch('../data/zhihu_data_new.csv').then(r => { if(!r.ok) throw new Error(r.status); return r.text(); })
]).then(res => {
    document.getElementById('loading').style.display = 'none';

    // 1. 合并原始数据
    const rawList = [...parseCSV(res[0]), ...parseCSV(res[1])];
    
    // 2. 去重逻辑 (Keyword + URL)
    const uniqueMap = new Map();
    const all = [];

    rawList.forEach(item => {
        const uniqueKey = `${item.keyword}_${item.url || item.title}`;
        if (!uniqueMap.has(uniqueKey)) {
            uniqueMap.set(uniqueKey, true);
            all.push(item);
        }
    });

    // 3. 赋值给全局变量
    GLOBAL_ALL_DATA = all;

    document.getElementById('total-posts').innerText = all.length;
    
    const globalStats = buildStats(all);
    drawLine(document.getElementById('global-month'), globalStats.monthly.labels, globalStats.monthly.data);
    drawWeekly(document.getElementById('global-week'), globalStats.weekly);

    const grouped = {};
    all.forEach(d => {
        grouped[d.keyword] = grouped[d.keyword] || [];
        grouped[d.keyword].push(d);
    });
    
    document.getElementById('total-people').innerText = Object.keys(grouped).length;
    renderPersons(grouped);

}).catch(err => {
    document.getElementById('loading').innerHTML = `
        <div style="text-align:center; color:#f00; padding:20px;">
            <p>数据加载失败</p>
            <small>${err.message}</small>
            <p>请检查 ../data/ 目录下是否存在 zhihu_data.csv 和 zhihu_data_new.csv</p>
        </div>
    `;
    console.error("Data Load Error:", err);
});
</script>

</body>
</html>
