<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CSV 智能分析 - 社会雷达</title>

<link rel="stylesheet" href="../CSS/work.css">
<link rel="stylesheet" href="../CSS/analysis.css">

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  /* 补充下拉菜单和加载动画的兼容样式 */
  .dropdown { position: relative; display: inline-block; }
  .dropdown-content { display: none; position: absolute; background-color: var(--card-bg); min-width: 120px; box-shadow: var(--shadow); z-index: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
  .dropdown-content a { color: var(--text-main); padding: 12px 16px; text-decoration: none; display: block; font-size: 0.9rem; }
  .dropdown-content a:hover { background-color: var(--bg-color); color: var(--primary-color); }
  .dropdown:hover .dropdown-content { display: block; }
  
  #loading-spinner { display: none; text-align: center; padding: 40px; color: var(--primary-color); }
  .spinner-icon { animation: spin 1s linear infinite; margin-bottom: 10px; }
  @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<header id="common-header"></header>

<main class="container">
  <section class="page-header">
    <h1>CSV 数据智能分析</h1>
    <p class="subtitle">上传您的社交媒体数据，即刻生成基于社会多普勒框架的传播分析报告。</p>
  </section>

  <div class="upload-card" id="upload-card">
    <div class="drop-area" id="drop-area">
      <div class="icon-cloud">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <h3>点击或拖拽 CSV 文件至此</h3>
      <p class="hint">支持格式：UTF-8 编码 CSV，需包含时间字段 (如 publish_time, created_at)</p>
      <input id="file-input" type="file" accept=".csv" style="display:none" />
      <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">选择文件</button>
    </div>
  </div>

  <div id="loading-spinner">
    <svg class="spinner-icon" viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>
    <h3>📡 雷达正在强力解析数据，请稍候...</h3>
  </div>

  <div id="result-section" style="display:none;">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="label">数据总量</div>
            <div class="value" id="res-total">0</div>
        </div>
        <div class="stat-card">
            <div class="label">时间跨度</div>
            <div class="value sub" id="res-range">-</div>
        </div>
        <div class="stat-card">
            <div class="label">峰值传播速度</div>
            <div class="value" id="res-peak">0</div>
        </div>
    </div>

    <div class="chart-card">
        <div class="chart-header">
            <h2>传播多普勒效应模拟</h2>
            <div class="chart-legend">
                <span class="dot primary" style="background:#0084ff; display:inline-block; width:10px; height:10px; border-radius:50%;"></span> 传播热度 (S)
                <span class="dot secondary" style="background:#ff8200; display:inline-block; width:10px; height:10px; border-radius:50%; margin-left:15px;"></span> 传播速度 (v)
            </div>
        </div>
        <div id="main-chart" style="width:100%; height:400px;"></div>
        <p class="chart-note">
            * <strong>传播热度</strong>：单位时间内的内容/互动数量。<br>
            * <strong>传播速度 (Velocity)</strong>：热度的一阶导数，模拟社会波的传播速率。正值代表话题加速扩散，负值代表衰减。
        </p>
    </div>

    <div style="text-align:center; margin-top:30px;">
        <button class="btn btn-secondary" onclick="resetPage()">重新上传</button>
        <button class="btn btn-primary" onclick="alert('报告已生成 PDF (演示)')">下载分析报告</button>
    </div>
  </div>
</main>

<script src="../JS/navbar.js"></script>

<script>
// ================= 核心逻辑 =================
const dropArea = document.getElementById('drop-area');
const fileInput = document.getElementById('file-input');
const resultSection = document.getElementById('result-section');
const loadingSpinner = document.getElementById('loading-spinner');
const uploadCard = document.getElementById('upload-card');

let chartInstance = null; // 用于管理 ECharts 实例，防止内存泄漏
let currentChartData = null; // 缓存当前渲染的数据，方便切换主题时重绘

// 启动主题变化的全局监听
document.addEventListener('DOMContentLoaded', () => {
    observeThemeChange();
});

// 1. 拖拽交互
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, preventDefaults, false);
});
function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

['dragenter', 'dragover'].forEach(eventName => {
    dropArea.addEventListener(eventName, () => dropArea.classList.add('highlight'), false);
});
['dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, () => dropArea.classList.remove('highlight'), false);
});

dropArea.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files), false);
fileInput.addEventListener('change', function() { handleFiles(this.files); });

function handleFiles(files) {
    if(files.length > 0) {
        const file = files[0];
        if(file.type !== "text/csv" && !file.name.endsWith('.csv')) {
            alert("请上传 CSV 格式文件");
            return;
        }
        processFileRobust(file);
    }
}

// 2. 使用 PapaParse 进行稳健解析
function processFileRobust(file) {
    uploadCard.style.display = 'none';
    resultSection.style.display = 'none';
    loadingSpinner.style.display = 'block'; // 显示加载动画
    
    Papa.parse(file, {
        header: true, // 自动将第一行作为表头
        skipEmptyLines: true,
        complete: function(results) {
            loadingSpinner.style.display = 'none';
            const data = results.data;
            if(data.length === 0) {
                alert("数据为空或格式无法识别");
                resetPage();
                return;
            }
            analyzeAndRender(data);
        },
        error: function(err) {
            loadingSpinner.style.display = 'none';
            alert("文件解析失败: " + err.message);
            resetPage();
        }
    });
}

// 3. 数据分析
function analyzeAndRender(data) {
    const dateMap = {};
    
    // 智能寻找时间列
    let timeKey = null;
    if(data.length > 0) {
        const keys = Object.keys(data[0]);
        // 匹配常见的时间字段名
        timeKey = keys.find(k => k.toLowerCase().match(/(time|date|created_at|publish)/));
    }

    if(!timeKey) {
        alert("未能在表头中找到时间相关的字段 (如 time, date, created_at, publish_time)，请检查 CSV。");
        resetPage();
        return;
    }

    // 按日期聚合
    data.forEach(row => {
        let rawDate = row[timeKey];
        let normalizedDate = normalizeDate(rawDate);
        if(normalizedDate) {
            dateMap[normalizedDate] = (dateMap[normalizedDate] || 0) + 1;
        }
    });

    const sortedDates = Object.keys(dateMap).sort();
    if(sortedDates.length === 0) {
        alert("未能解析出有效的时间格式。");
        resetPage();
        return;
    }

    const counts = sortedDates.map(d => dateMap[d]);
    // 计算速度 (差值)
    const velocity = counts.map((val, i) => i === 0 ? 0 : val - counts[i-1]);

    // 更新界面统计数字
    resultSection.style.display = 'block';
    document.getElementById('res-total').innerText = data.length.toLocaleString();
    document.getElementById('res-range').innerText = `${sortedDates[0]} 至 ${sortedDates[sortedDates.length-1]}`;
    const maxV = Math.max(...velocity);
    document.getElementById('res-peak').innerText = "+" + maxV;

    // 缓存数据用于主题切换时重绘
    currentChartData = { dates: sortedDates, counts: counts, velocity: velocity };
    
    // 绘制图表
    renderChart();
}

function normalizeDate(str) {
    if(!str) return null;
    str = String(str).trim();
    // 尝试解析 YYYY-MM-DD
    const match = str.match(/\d{4}-\d{2}-\d{2}/);
    if(match) return match[0];
    // 处理带小时分钟的模糊匹配归为今天
    if(str.includes('小时') || str.includes('分')) return new Date().toISOString().slice(0,10);
    return null; 
}

// 4. ECharts 渲染函数
function renderChart() {
    if (!currentChartData) return;

    const chartDom = document.getElementById('main-chart');
    // 如果之前有图表实例，先销毁，防止内存泄漏和重影
    if (chartInstance != null) {
        chartInstance.dispose();
    }
    chartInstance = echarts.init(chartDom);

    // 获取当前主题字体颜色
    const textColor = document.documentElement.getAttribute('data-theme') === 'dark' ? '#c9d1d9' : '#2c3e50';

    const option = {
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
        grid: { top: 40, right: 50, bottom: 40, left: 50 },
        legend: { show: false }, 
        xAxis: { 
            type: 'category', 
            data: currentChartData.dates, 
            boundaryGap: false,
            axisLabel: { color: textColor }
        },
        yAxis: [
            { 
                type: 'value', 
                name: '热度', 
                position: 'left', 
                splitLine: { show: false },
                nameTextStyle: { color: textColor },
                axisLabel: { color: textColor }
            },
            { 
                type: 'value', 
                name: '速度', 
                position: 'right', 
                splitLine: { lineStyle: { type: 'dashed', color: 'rgba(150,150,150,0.2)' } },
                nameTextStyle: { color: textColor },
                axisLabel: { color: textColor }
            }
        ],
        series: [
            {
                name: '传播热度',
                type: 'line',
                smooth: true,
                data: currentChartData.counts,
                yAxisIndex: 0,
                itemStyle: { color: '#0084ff' },
                areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(0,132,255,0.2)'},{offset:1,color:'rgba(0,132,255,0)'}]) }
            },
            {
                name: '传播速度',
                type: 'line',
                smooth: true,
                data: currentChartData.velocity,
                yAxisIndex: 1,
                itemStyle: { color: '#ff8200' },
                lineStyle: { type: 'dashed', width: 2 }
            }
        ]
    };
    chartInstance.setOption(option);
    window.addEventListener('resize', () => chartInstance.resize());
}

// 5. 监听全局主题变化
function observeThemeChange() {
    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.attributeName === 'data-theme') {
                renderChart(); // 主题切换时重新渲染图表以更改文字颜色
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
}

function resetPage() {
    fileInput.value = '';
    uploadCard.style.display = 'block';
    resultSection.style.display = 'none';
    loadingSpinner.style.display = 'none';
    currentChartData = null;
    if (chartInstance != null) {
        chartInstance.dispose();
        chartInstance = null;
    }
}
</script>

</body>
</html>
