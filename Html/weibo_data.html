<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>微信文章追踪分析 - 学术雷达</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../CSS/data.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<style>
  :root {
    --bg-color: #f5f7fa;
    --card-bg: #ffffff;
    --text-main: #2c3e50;
    --text-muted: #7f8c8d;
    --border-color: #e4e7ed;
    --shadow: 0 4px 12px rgba(0,0,0,0.05);
    /* 微信专属绿 */
    --primary-color: #07c160; 
    --primary-light: #e1f6ea;
    --link-hover: #059b4c;
  }

  [data-theme="dark"] {
    --bg-color: #0d1117;
    --card-bg: #161b22;
    --text-main: #c9d1d9;
    --text-muted: #8b949e;
    --border-color: #30363d;
    --shadow: 0 4px 12px rgba(0,0,0,0.4);
    --primary-light: rgba(7, 193, 96, 0.15);
    --link-hover: #1add75;
  }

  body { background-color: var(--bg-color); color: var(--text-main); transition: background-color 0.3s; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;}
  
  #loading { color: var(--primary-color); }

  .card { background-color: var(--card-bg); border-color: var(--border-color); color: var(--text-main); padding: 20px; border-radius: 12px; margin-bottom: 20px;}
  .person-card { background-color: var(--card-bg); border: 1px solid var(--border-color); box-shadow: var(--shadow); }
  .person-header { border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.02); }
  .stat-box { background: var(--bg-color); border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; text-align: center; flex: 1;}
  .summary-bar { display: flex; gap: 20px; margin-bottom: 20px; }
  .stat-num { font-size: 24px; font-weight: bold; display: block; margin-bottom: 5px;}
  
  /* 文章列表与链接样式 */
  .person-post-list a.article-link { 
      color: var(--text-main); 
      text-decoration: none; 
      font-weight: 600; 
      display: block; 
      margin-bottom: 8px; 
      font-size: 1.05rem;
      transition: color 0.2s ease;
  }
  .person-post-list a.article-link:hover {
      color: var(--link-hover);
      text-decoration: underline;
  }
  .article-summary { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }
  .person-avatar { background: var(--primary-color) !important; color: #fff; }
</style>
</head>
<body>

<div id="loading" style="text-align: center; padding: 50px;">正在从 ../data 目录读取微信数据...</div>

<div class="container" style="max-width: 1200px; margin: 20px auto; padding: 0 20px;">

  <div class="card">
    <h2>微信公众号学术数据概览</h2>
    
    <div class="summary-bar">
        <div class="stat-box">
            <span class="stat-num" id="total-posts" style="color: var(--primary-color);">0</span>
            <span class="stat-label">累计收录文章</span>
        </div>
        <div class="stat-box">
            <span class="stat-num" id="total-people" style="color: var(--primary-color);">0</span>
            <span class="stat-label">覆盖专家/主题</span>
        </div>
    </div>

    <div class="charts-wrapper" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div>
        <h3 style="font-size: 16px;">总发文趋势（按月）</h3>
        <div id="global-month" style="height: 250px;"></div>
      </div>
      <div>
        <h3 style="font-size: 16px;">近一周发文（按日）</h3>
        <div id="global-week" style="height: 250px;"></div>
      </div>
    </div>
  </div>

  <div id="content-area"></div>

</div>

<script>
// 日期基准：如果今天没有数据，用来回溯过去7天的图表展示
const CURRENT_DATE = new Date(); 

let GLOBAL_ALL_DATA = [];
let GLOBAL_GROUPED = {};

/* ================= 增强型 CSV 解析 ================= */
function parseCSVLine(line) {
    const result = [];
    let startValue = 0;
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') {
            inQuotes = !inQuotes;
        } else if (line[i] === ',' && !inQuotes) {
            let val = line.substring(startValue, i);
            if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1).replace(/""/g, '"');
            result.push(val);
            startValue = i + 1;
        }
    }
    let lastVal = line.substring(startValue);
    if (lastVal.startsWith('"') && lastVal.endsWith('"')) lastVal = lastVal.slice(1, -1).replace(/""/g, '"');
    result.push(lastVal);
    return result;
}

function parseCSV(text){
    const lines = text.trim().split('\n');
    return lines.slice(1).map(l => {
        const arr = parseCSVLine(l);
        // 新版 Python 有6列: 关键词, 文章标题, 公众号, 发布日期, 摘要, 文章链接
        if(arr.length < 5) return null;
        
        let rawDate = arr[3] ? arr[3].replace(/[年月日]/g, '-').replace(/-$/, '') : "";
        if (rawDate.length > 10) rawDate = rawDate.substring(0, 10);
        
        return {
            keyword: arr[0],       
            title: arr[1],         
            account: arr[2],       
            created_at: rawDate,   
            summary: arr[4],       
            url: arr[5] || '#'     // 提取第6列的超链接
        };
    }).filter(item => item !== null && item.keyword);
}

/* ================= ECharts 绘图函数 ================= */
// (此处保留图表绘制逻辑，为了节约篇幅，图表构建逻辑与之前一致)
function buildStats(data) {
    const monthMap = {}; const weekMap = {}; const weekDays = [];
    const start = new Date(CURRENT_DATE); start.setDate(start.getDate() - 6);

    for(let i=0; i<7; i++){
        const d = new Date(start); d.setDate(d.getDate()+i);
        const k = d.toISOString().slice(0,10); weekDays.push(k); weekMap[k] = 0;
    }

    data.forEach(d => {
        if(!d.created_at) return;
        const m = d.created_at.slice(0,7);
        if (m.length === 7) monthMap[m] = (monthMap[m]||0)+1;
        const day = d.created_at.slice(0,10);
        if(weekMap[day] !== undefined) weekMap[day]++;
    });

    return {
        monthly: { labels: Object.keys(monthMap).sort(), data: Object.keys(monthMap).sort().map(k => monthMap[k]) },
        weekly: { labels: weekDays, data: weekDays.map(d => weekMap[d]), hasData: Object.values(weekMap).some(v => v > 0) }
    };
}

function drawLine(dom, labels, data, color='#07c160'){
    if(!dom) return;
    let chart = echarts.getInstanceByDom(dom);
    if (chart) chart.dispose();
    chart = echarts.init(dom);

    chart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { top: 20, right: 10, bottom: 20, left: 30, containLabel: true },
        xAxis: { type: 'category', data: labels, axisLabel: { fontSize: 11 } },
        yAxis: { type: 'value', minInterval: 1, splitLine: { lineStyle: { type: 'dashed' } } },
        series: [{
            type: 'line', data: data, smooth: true, symbol: 'circle', symbolSize: 6,
            itemStyle: { color: color },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: color.replace(')', ', 0.2)').replace('rgb', 'rgba') },
                    { offset: 1, color: 'rgba(255, 255, 255, 0)' }
                ])
            }
        }]
    });
    window.addEventListener('resize', () => chart.resize());
}

/* ================= 渲染人物/话题卡片 ================= */
function renderPersons(grouped){
    const area = document.getElementById('content-area');
    area.innerHTML = '';

    Object.keys(grouped).forEach((keyword, index) => {
        const personData = grouped[keyword];
        const stats = buildStats(personData);
        // 每个关键词展示最新获取的 8 篇文章
        const showPosts = personData.slice(0, 8); 

        let postsHtml = '<ul class="person-post-list" style="list-style:none; padding:0;">';
        showPosts.forEach(p => {
            const displayTitle = p.title.length > 50 ? p.title.substring(0, 50) + '...' : p.title;
            const displaySummary = p.summary && p.summary !== 'N/A' ? (p.summary.length > 70 ? p.summary.substring(0, 70) + '...' : p.summary) : '暂无摘要内容';
            
            // 核心修改：使用提取到的 p.url，并添加 hover 样式类 .article-link
            postsHtml += `
                <li style="margin-bottom: 16px; border-bottom: 1px dashed var(--border-color); padding-bottom: 12px;">
                    <a href="${p.url}" target="_blank" title="点击阅读原文：${p.title}" class="article-link">
                        ${displayTitle} 🔗
                    </a>
                    <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 6px;">
                        <span style="font-size: 0.85rem; color: var(--primary-color); background: var(--primary-light); padding: 2px 6px; border-radius: 4px;">来源: ${p.account}</span>
                        <span style="font-size: 0.85rem; color: var(--text-muted);">日期: ${p.created_at}</span>
                    </div>
                    <div class="article-summary">${displaySummary}</div>
                </li>
            `;
        });
        postsHtml += '</ul>';

        const card = document.createElement('div');
        card.className = 'person-card';
        card.style.cssText = 'background: var(--card-bg); border-radius: 12px; margin-bottom: 25px; overflow: hidden; box-shadow: var(--shadow);';
        
        const mChartId = `m-${index}`;
        const wChartId = `w-${index}`;

        card.innerHTML = `
            <div class="person-header" style="padding: 15px 20px; display: flex; align-items: center; gap: 15px;">
                <div class="person-avatar" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold;">${keyword[0]}</div>
                <div class="person-info">
                    <h3 style="margin: 0;">${keyword}</h3>
                    <span style="background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-muted); padding: 2px 8px; border-radius: 12px; font-size: 12px; display: inline-block; margin-top: 5px;">相关文章: ${personData.length} 篇</span>
                </div>
            </div>

            <div style="padding: 20px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div>
                        <h4 style="margin:0 0 5px 0; font-size:12px; color:var(--text-muted);">月度发文声量</h4>
                        <div id="${mChartId}" style="height:140px; width:100%;"></div>
                    </div>
                    <div>
                        <h4 style="margin:0 0 5px 0; font-size:12px; color:var(--text-muted);">近七日发文</h4>
                        <div id="${wChartId}" style="height:140px; width:100%;"></div>
                    </div>
                </div>

                <div style="background: var(--bg-color); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);">
                    <h4 style="margin-top:0; color: var(--text-muted);">📖 文章追踪列表 (点击标题可跳转)</h4>
                    ${postsHtml}
                </div>
            </div>
        `;

        area.appendChild(card);

        setTimeout(() => {
            drawLine(document.getElementById(mChartId), stats.monthly.labels, stats.monthly.data, '#07c160');
            if(stats.weekly.hasData) {
                drawLine(document.getElementById(wChartId), stats.weekly.labels.map(d=>d.slice(5)), stats.weekly.data, '#07c160');
            } else {
                document.getElementById(wChartId).innerHTML = '<div style="color:var(--text-muted); text-align:center; padding-top: 40px; font-size: 12px;">近七日无更新</div>';
            }
        }, 0);
    });
}

/* ================= 主程序入口 ================= */
// 修改为从上级 data 目录获取 CSV
fetch('../data/wechat_research_data.csv')
    .then(r => { 
        if(!r.ok) throw new Error(r.status); 
        return r.text(); 
    })
    .then(res => {
        document.getElementById('loading').style.display = 'none';

        const all = parseCSV(res);
        GLOBAL_ALL_DATA = all;

        document.getElementById('total-posts').innerText = all.length;
        
        const globalStats = buildStats(all);
        drawLine(document.getElementById('global-month'), globalStats.monthly.labels, globalStats.monthly.data, '#07c160');
        if(globalStats.weekly.hasData){
            drawLine(document.getElementById('global-week'), globalStats.weekly.labels.map(d=>d.slice(5)), globalStats.weekly.data, '#07c160');
        } else {
             document.getElementById('global-week').innerHTML = '<div style="color:var(--text-muted); text-align:center; padding-top: 100px;">近七日无更新</div>';
        }

        const grouped = {};
        all.forEach(d => {
            grouped[d.keyword] = grouped[d.keyword] || [];
            grouped[d.keyword].push(d);
        });
        
        GLOBAL_GROUPED = grouped;
        document.getElementById('total-people').innerText = Object.keys(grouped).length;
        renderPersons(grouped);

    })
    .catch(err => {
        document.getElementById('loading').innerHTML = `
            <div style="text-align:center; color:#e6162d; padding:20px;">
                <p>数据读取失败，请确认是否已运行爬虫，并且文件位于 ../data/wechat_research_data.csv</p>
            </div>
        `;
    });
</script>

</body>
</html>
