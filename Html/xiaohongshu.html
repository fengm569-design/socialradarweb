<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小红书数据分析 - 社会雷达</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../CSS/xiaohongshu_data.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<style>
  /* 全局样式基础变量补充 (防缺失) */
  :root {
    --bg-color: #f5f7fa;
    --card-bg: #ffffff;
    --text-main: #2c3e50;
    --text-muted: #7f8c8d;
    --primary-color: #0084ff;
    --border-color: #e4e7ed;
    --shadow: 0 4px 12px rgba(0,0,0,0.05);
  }

  [data-theme="dark"] {
    --bg-color: #0d1117;
    --card-bg: #161b22;
    --text-main: #c9d1d9;
    --text-muted: #8b949e;
    --border-color: #30363d;
    --shadow: 0 4px 12px rgba(0,0,0,0.4);
  }

  body { background-color: var(--bg-color); color: var(--text-main); transition: background-color 0.3s; }
  
  /* 导航栏样式补充 (适配 navbar.js) */
  header { background-color: var(--card-bg); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .nav { display: flex; justify-content: space-between; align-items: center; height: 60px; }
  .brand { font-size: 1.2rem; font-weight: bold; color: var(--primary-color); }
  .menu { display: flex; align-items: center; gap: 20px; font-size: 0.95rem; }
  .menu a { text-decoration: none; color: inherit; }
  .menu a:hover, .menu a.active { color: var(--primary-color); }
  .theme-btn { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 5px; }

  /* 下拉菜单补充 */
  .dropdown { position: relative; display: inline-block; }
  .dropdown-content { display: none; position: absolute; background-color: var(--card-bg); min-width: 120px; box-shadow: var(--shadow); z-index: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
  .dropdown-content a { color: var(--text-main); padding: 12px 16px; text-decoration: none; display: block; font-size: 0.9rem; }
  .dropdown-content a:hover { background-color: var(--bg-color); color: var(--primary-color); }
  .dropdown:hover .dropdown-content { display: block; }
</style>

</head>
<body>

<header id="common-header"></header>

<main class="container">
  
  <div class="card summary-card" style="background-color: var(--card-bg); border-color: var(--border-color);">
    <h2>数据概览</h2>
    <div class="summary-stats">
        <div class="stat-item">
            <div class="stat-num" id="total-batches">0</div>
            <div class="stat-desc">监控话题</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="total-notes">0</div>
            <div class="stat-desc">笔记总数</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="total-likes">0</div>
            <div class="stat-desc">总获赞数</div>
        </div>
    </div>
  </div>

  <div class="card" style="background-color: var(--card-bg); border-color: var(--border-color);">
      <div class="card-header" style="border-bottom:none; padding-left:0;">
        <h2 style="margin:0; border-left:4px solid #ff2442; padding-left:10px;">小红书综合热度趋势 (所有话题总和)</h2>
      </div>
      <div id="global-trend-chart" style="width: 100%; height: 350px;"></div>
  </div>

  <div class="card" style="margin: 20px 0; padding: 15px; display: flex; align-items: center; gap: 15px; background: #fff0f0; border: 1px solid #ffcccc;">
      <h3 style="margin: 0; font-size: 16px; color: #333;">🔍 数据筛选：</h3>
      <label style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
          <input type="checkbox" id="negative-filter" onchange="toggleFilter()">
          <span style="color: #d32f2f; font-weight: bold;">只看“避雷/吐槽”内容</span>
      </label>
      <span style="color: #888; font-size: 12px;">(关键词：避雷, 踩坑, 失望, 拔草, 差评, 吐槽, 无语, 后悔...)</span>
  </div>

  <div id="content-area">
    <div class="loading">正在加载数据...</div>
  </div>

</main>

<script src="../JS/navbar.js"></script>

<script>
const CURRENT_DATE = new Date(); 

// 定义小红书特有的负面关键词
const NEGATIVE_KEYWORDS = ["避雷", "踩坑", "失望", "差评", "吐槽", "黑榜", "垃圾", "无语", "别去", "别买", "后悔", "上当", "拔草", "劝退", "恶心", "不行", "烂", "智商税"];

// 全局数据缓存
let GLOBAL_ALL_DATA = [];
let globalChartInstance = null;

// ================= 主题监听与颜色获取 =================
document.addEventListener('DOMContentLoaded', () => {
    observeThemeChange();
});

function observeThemeChange() {
    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.attributeName === 'data-theme' && GLOBAL_ALL_DATA.length > 0) {
                // 主题切换时重新渲染图表以适配文字颜色
                renderGlobalTrendChart(GLOBAL_ALL_DATA);
                toggleFilter(); // 重新渲染下方列表和小图表
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
}

function getTextColor() {
    return document.documentElement.getAttribute('data-theme') === 'dark' ? '#c9d1d9' : '#333333';
}

// ================= 筛选逻辑 =================
function toggleFilter() {
    const isFilterOn = document.getElementById('negative-filter').checked;
    const area = document.getElementById('content-area');
    
    // 重新分组
    const grouped = {};
    let filteredCount = 0;

    GLOBAL_ALL_DATA.forEach(d => {
        if (isFilterOn) {
            const textToCheck = d.title.toLowerCase();
            const hasNegativeWord = NEGATIVE_KEYWORDS.some(kw => textToCheck.includes(kw));
            if (!hasNegativeWord) return;
        }

        if (!grouped[d.batch_name]) grouped[d.batch_name] = [];
        grouped[d.batch_name].push(d);
        filteredCount++;
    });

    if (Object.keys(grouped).length === 0) {
        area.innerHTML = '<div style="text-align:center; padding:50px; color:var(--text-muted);">没有找到符合条件的负面内容</div>';
        document.getElementById('total-notes').innerText = filteredCount + (isFilterOn ? " (筛选后)" : "");
        return;
    }

    document.getElementById('total-notes').innerText = filteredCount + (isFilterOn ? " (筛选后)" : "");
    document.getElementById('total-batches').innerText = Object.keys(grouped).length;

    render(grouped);
}

// ================= 时间精准化格式处理 (重构) =================
function processDate(rawDateStr) {
    if (!rawDateStr) return { date: null, timestamp: 0 };
    let str = rawDateStr.toString().trim();
    const now = new Date(CURRENT_DATE); 
    
    // 尝试提取时间部分 (HH:mm)
    let timePart = "00:00:00";
    const timeMatch = str.match(/(\d{1,2}):(\d{2})/);
    if (timeMatch) {
        timePart = `${String(timeMatch[1]).padStart(2, '0')}:${String(timeMatch[2]).padStart(2, '0')}:00`;
    }

    let y = now.getFullYear();
    let m = now.getMonth() + 1;
    let d = now.getDate();

    if (str.match(/^\d{4}-\d{1,2}-\d{1,2}/)) {
        const parts = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
        y = parseInt(parts[1]); m = parseInt(parts[2]); d = parseInt(parts[3]);
    } else if (str.match(/^\d{1,2}-\d{1,2}/)) {
        const parts = str.match(/^(\d{1,2})-(\d{1,2})/);
        m = parseInt(parts[1]); d = parseInt(parts[2]);
    } else if (str.includes('昨天')) {
        now.setDate(now.getDate() - 1);
        y = now.getFullYear(); m = now.getMonth() + 1; d = now.getDate();
    } else if (str.includes('前天')) {
        now.setDate(now.getDate() - 2);
        y = now.getFullYear(); m = now.getMonth() + 1; d = now.getDate();
    } else if (str.includes('天前')) {
        const days = parseInt(str) || 0;
        now.setDate(now.getDate() - days);
        y = now.getFullYear(); m = now.getMonth() + 1; d = now.getDate();
    } else if (str.includes('小时前')) {
        const hours = parseInt(str) || 0;
        now.setHours(now.getHours() - hours);
        y = now.getFullYear(); m = now.getMonth() + 1; d = now.getDate();
        timePart = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:00`;
    } else if (str.includes('分钟前') || str.includes('刚刚')) {
        const mins = parseInt(str) || 0;
        now.setMinutes(now.getMinutes() - mins);
        y = now.getFullYear(); m = now.getMonth() + 1; d = now.getDate();
        timePart = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:00`;
    } else if (str.includes('今天')) {
        // 保留当天时间
    } else {
        return { date: null, timestamp: 0 };
    }

    const datePart = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    
    // 使用 "YYYY/MM/DD HH:mm:ss" 彻底规避苹果 Safari 等浏览器的 NaN 报错问题，且强制统一为本地时区
    const safeDateStr = `${y}/${String(m).padStart(2, '0')}/${String(d).padStart(2, '0')} ${timePart}`;
    const timestamp = new Date(safeDateStr).getTime();

    return { date: datePart, timestamp: timestamp };
}

// ================= CSV 解析 (更新) =================
function parseCSVLine(line) {
    const result = [];
    let startValue = 0;
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') inQuotes = !inQuotes;
        else if (line[i] === ',' && !inQuotes) {
            let val = line.substring(startValue, i);
            if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1).replace(/""/g, '"');
            result.push(val);
            startValue = i + 1;
        }
    }
    let lastVal = line.substring(startValue);
    if (lastVal.startsWith('"') && lastVal.endsWith('"')) lastVal = lastVal.slice(1, -1).replace(/""/g, '"');
    result.push(lastVal);
    return result;
}

function parseCSV(text){
    const lines = text.trim().split('\n');
    return lines.slice(1).map(l => {
        const arr = parseCSVLine(l);
        if(arr.length < 5) return null;
        const rawDate = arr[3];
        const timeObj = processDate(rawDate);
        
        if (!timeObj.date) return null;
        
        return {
            batch_name: arr[0] || '未分类',
            note_id: arr[1],
            title: arr[2] || '无标题',
            publish_time: timeObj.date,   // 仅作图表分类用的 YYYY-MM-DD
            timestamp: timeObj.timestamp, // 用于严格排序的毫秒级时间戳
            raw_time: rawDate,            // 界面显示的原始可读时间
            author_name: arr[6],
            like_count: parseInt(arr[7]) || 0, 
            url: arr[11] || '#'
        };
    }).filter(d => d !== null);
}

// ================= 全局趋势图 =================
function renderGlobalTrendChart(allData) {
    const dom = document.getElementById('global-trend-chart');
    if(!dom) return;

    if (globalChartInstance != null) {
        globalChartInstance.dispose();
    }
    globalChartInstance = echarts.init(dom);

    const dateMap = {};
    allData.forEach(d => {
        const date = d.publish_time;
        dateMap[date] = (dateMap[date] || 0) + 1;
    });

    const sortedDates = Object.keys(dateMap).sort();
    const counts = sortedDates.map(d => dateMap[d]);
    const textColor = getTextColor();

    globalChartInstance.setOption({
        tooltip: { 
            trigger: 'axis',
            formatter: '{b} <br/> 全网总新增: {c} 篇',
            backgroundColor: 'rgba(255, 255, 255, 0.95)',
            textStyle: { color: '#333' }
        },
        grid: { top: 30, left: 20, right: 30, bottom: 20, containLabel: true },
        xAxis: { 
            type: 'category', 
            data: sortedDates, 
            boundaryGap: false,
            axisLine: { lineStyle: { color: textColor } },
            axisLabel: { color: textColor }
        },
        yAxis: { 
            type: 'value', 
            minInterval: 1,
            splitLine: { lineStyle: { type: 'dashed', color: 'rgba(150,150,150,0.2)' } },
            axisLabel: { color: textColor }
        },
        series: [{
            name: '总热度',
            type: 'line',
            data: counts,
            smooth: true,
            symbol: 'circle',
            symbolSize: 8,
            itemStyle: { color: '#ff2442', borderColor: '#fff', borderWidth: 2 },
            lineStyle: { width: 3, shadowColor: 'rgba(255,36,66,0.3)', shadowBlur: 10 },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: 'rgba(255, 36, 66, 0.3)' },
                    { offset: 1, color: 'rgba(255, 36, 66, 0.0)' }
                ])
            }
        }]
    });

    window.addEventListener('resize', () => globalChartInstance.resize());
}

// ================= 单个话题趋势图 =================
function buildTrendStats(data) {
    const dateMap = {};
    data.forEach(d => {
        dateMap[d.publish_time] = (dateMap[d.publish_time] || 0) + 1;
    });
    const sortedDates = Object.keys(dateMap).sort();
    return { dates: sortedDates, counts: sortedDates.map(d => dateMap[d]) };
}

function drawSmallChart(domId, stats, color) {
    const dom = document.getElementById(domId);
    if (!dom || stats.dates.length === 0) {
        if(dom) dom.innerHTML = '<div class="no-data" style="color:var(--text-muted)">暂无数据</div>';
        return;
    }
    const chart = echarts.init(dom);
    const textColor = getTextColor();

    chart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { top: 20, right: 10, bottom: 20, left: 30, containLabel: true },
        xAxis: { 
            type: 'category', 
            data: stats.dates, 
            axisLine: { lineStyle: { color: textColor } },
            axisLabel: { color: textColor }
        },
        yAxis: { 
            type: 'value', 
            minInterval: 1, 
            splitLine: { lineStyle: { type: 'dashed', color: 'rgba(150,150,150,0.2)' } },
            axisLabel: { color: textColor }
        },
        series: [{
            data: stats.counts, type: 'line', smooth: true, symbol: 'none',
            itemStyle: { color: color },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:color.replace(')',',0.2)').replace('rgb','rgba')},{offset:1,color:'rgba(255,255,255,0)'}])
            }
        }]
    });
    window.addEventListener('resize', () => chart.resize());
}

// ================= 页面渲染主逻辑 =================
function render(groupedData) {
    const container = document.getElementById('content-area');
    container.innerHTML = '';
    const isFilterOn = document.getElementById('negative-filter').checked;
    const batchNames = Object.keys(groupedData);

    batchNames.forEach((name, index) => {
        const items = groupedData[name];
        const totalLikes = items.reduce((sum, item) => sum + item.like_count, 0);
        const stats = buildTrendStats(items);
        
        // 按真实毫秒时间戳严格倒序排列
        const topPosts = [...items].sort((a, b) => b.timestamp - a.timestamp).slice(0, 5); 

        let postsHtml = '<ul class="post-list" style="list-style:none; padding:0;">';
        topPosts.forEach(p => {
            let displayTitle = p.title;
            if (isFilterOn) {
                NEGATIVE_KEYWORDS.forEach(kw => {
                    displayTitle = displayTitle.replace(new RegExp(kw, 'g'), `<span style="color:#d32f2f;background:#ffebee;padding:0 2px;border-radius:2px;">${kw}</span>`);
                });
            }

            // 使用 p.raw_time 渲染时间展示，增强可读性
            postsHtml += `<li style="margin-bottom: 12px; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px;">
                <a href="${p.url}" target="_blank" title="${p.title}" style="color: var(--text-main); text-decoration: none; font-weight: 500; display: block; margin-bottom: 5px;">${displayTitle}</a>
                <div class="post-meta" style="font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 15px;">
                    <span>❤️ ${p.like_count}</span>
                    <span class="date">📅 ${p.raw_time}</span> 
                </div>
            </li>`;
        });
        postsHtml += '</ul>';

        const chartId = `chart-${index}`;
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.style.cssText = 'background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 25px; overflow: hidden; box-shadow: var(--shadow);';
        
        card.innerHTML = `
            <div class="card-header" style="background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--border-color); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;">
                <div class="topic-title" style="font-size: 1.2rem; font-weight: bold; color: var(--text-main);"><span style="color:#ff2442; margin-right:5px;">#</span> ${name}</div>
                <div class="topic-stats" style="font-size: 0.9rem;">
                    <span style="background: var(--bg-color); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border-color); margin-right: 10px;">笔记: ${items.length}</span>
                    <span style="background: #fff0f0; color: #ff2442; padding: 4px 10px; border-radius: 20px; border: 1px solid #ffcccc;">获赞: ${totalLikes}</span>
                </div>
            </div>
            <div class="card-body" style="display: flex; flex-wrap: wrap; padding: 20px;">
                <div class="chart-section" style="flex: 1; min-width: 300px; padding-right: 20px;">
                    <h4 style="margin-top:0; color: var(--text-muted); font-size: 0.95rem;">话题热度趋势 (篇/天)</h4>
                    <div id="${chartId}" class="chart-box" style="height: 250px;"></div>
                </div>
                <div class="list-section" style="flex: 1; min-width: 300px;">
                    <h4 style="margin-top:0; color: var(--text-muted); font-size: 0.95rem;">最新动态 ${isFilterOn ? '(负面)' : '(按时间)'}</h4>
                    ${postsHtml}
                </div>
            </div>`;
        container.appendChild(card);
        setTimeout(() => drawSmallChart(chartId, stats, '#ff2442'), 0);
    });
}

// ================= 入口 =================
fetch('../data/xiaohongshu_data.csv')
    .then(r => r.text())
    .then(text => {
        const data = parseCSV(text);
        
        GLOBAL_ALL_DATA = data;
        
        document.getElementById('total-notes').innerText = data.length;
        document.getElementById('total-likes').innerText = data.reduce((s, d) => s + d.like_count, 0);

        renderGlobalTrendChart(data);

        const grouped = {};
        data.forEach(d => {
            if (!grouped[d.batch_name]) grouped[d.batch_name] = [];
            grouped[d.batch_name].push(d);
        });
        
        document.getElementById('total-batches').innerText = Object.keys(grouped).length;
        render(grouped);
    })
    .catch(err => {
        console.error(err);
        document.getElementById('content-area').innerHTML = '<div style="text-align:center;padding:50px;color:red;">数据加载失败，请检查文件路径或跨域设置。</div>';
    });
</script>
</body>
</html>
